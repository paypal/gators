name: Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Check formatting with ruff
      run: ruff format --check gators/

    - name: Lint with ruff
      run: ruff check gators/

    - name: Type check with mypy
      run: mypy gators/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.14"
            os: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with coverage
      run: |
        pytest

    - name: Build wheel
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
      run: |
        python -m pip install build
        python -m build

    - name: Upload wheel
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/
