[tox]
envlist = py{310,311,312,313,314}
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run tests with pytest under {basepython}
deps =
    pytest>=8.0.0
    pytest-cov>=4.1.0
    pandas>=2.0.0
    polars>=0.19.0
    pyarrow>=20.0.0
    pydantic>=2.12.0
    typing-extensions>=4.15.0
    scikit-learn>=1.3.0
    xgboost>=2.0.0
    lightgbm>=4.0.0
    joblib>=1.3.0
    holidays>=0.92

commands =
    pytest {posargs:gators} -v --cov=gators --cov-report=term-missing

[testenv:lint]
description = Run code quality checks (ruff, mypy)
deps =
    ruff>=0.2.0
    mypy>=1.8.0
skip_install = True
commands =
    ruff format --check gators/
    ruff check gators/
    mypy gators/

[testenv:format]
description = Auto-format code with ruff
deps =
    ruff>=0.2.0
skip_install = True
commands =
    ruff format gators/
    ruff check --fix gators/

[testenv:coverage]
description = Generate coverage report in HTML
deps =
    pytest>=8.0.0
    pytest-cov>=4.1.0
    coverage[toml]>=7.0.0
commands =
    pytest gators -v --cov=gators --cov-report=html --cov-report=term-missing
    python -c "import webbrowser; webbrowser.open('htmlcov/index.html')"

[testenv:docs]
description = Build documentation (placeholder for future sphinx/mkdocs setup)
skip_install = False
commands =
    python -c "print('Documentation build not yet configured')"
